controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    wheel_separation: 0.445208
    wheel_radius: 0.0625

    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_footprint
    publish_tf: true
    enable_odom_tf: true

    # Covariance configuration
    pose_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 1000.0]
    twist_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 1000.0]

    # Command velocities input
    use_stamped_vel: true

joint_trajectory_controller:
  ros__parameters:
    joints:
      - ur5e_shoulder_pan_joint
      - ur5e_shoulder_lift_joint
      - ur5e_elbow_joint
      - ur5e_wrist_1_joint
      - ur5e_wrist_2_joint
      - ur5e_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      ur5e_shoulder_pan_joint: { trajectory: 0.2, goal: 0.1 }
      ur5e_shoulder_lift_joint: { trajectory: 0.2, goal: 0.1 }
      ur5e_elbow_joint: { trajectory: 0.2, goal: 0.1 }
      ur5e_wrist_1_joint: { trajectory: 0.2, goal: 0.1 }
      ur5e_wrist_2_joint: { trajectory: 0.2, goal: 0.1 }
      ur5e_wrist_3_joint: { trajectory: 0.2, goal: 0.1 }
