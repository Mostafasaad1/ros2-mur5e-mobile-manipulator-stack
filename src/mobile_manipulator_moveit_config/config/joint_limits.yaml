# joint_limits.yaml allows override of limits specified in URDF.
joint_limits:
  ur5e_shoulder_pan_joint:
    has_velocity_limits: true
    max_velocity: 3.141592653589793
    has_acceleration_limits: true
    max_acceleration: 5.0
  ur5e_shoulder_lift_joint:
    has_velocity_limits: true
    max_velocity: 3.141592653589793
    has_acceleration_limits: true
    max_acceleration: 5.0
  ur5e_elbow_joint:
    has_velocity_limits: true
    max_velocity: 3.141592653589793
    has_acceleration_limits: true
    max_acceleration: 5.0
  ur5e_wrist_1_joint:
    has_velocity_limits: true
    max_velocity: 3.141592653589793
    has_acceleration_limits: true
    max_acceleration: 5.0
  ur5e_wrist_2_joint:
    has_velocity_limits: true
    max_velocity: 3.141592653589793
    has_acceleration_limits: true
    max_acceleration: 5.0
  ur5e_wrist_3_joint:
    has_velocity_limits: true
    max_velocity: 3.141592653589793
    has_acceleration_limits: true
    max_acceleration: 5.0
  finger_left_joint:
    has_velocity_limits: true
    max_velocity: 0.5
    has_acceleration_limits: true
    max_acceleration: 5.0
    # Explicit position limits match URDF upper=0.06 (+20mm over 0.04 open)
    # and lower=-0.01 (-10mm under 0.0 closed) so that CheckStartStateBounds
    # never rejects the gripper plans when physical drift/shift occurs.
    has_position_limits: true
    min_position: -0.01
    max_position: 0.06
  finger_right_joint:
    has_velocity_limits: true
    max_velocity: 0.5
    has_acceleration_limits: true
    max_acceleration: 5.0
    has_position_limits: true
    min_position: -0.01
    max_position: 0.06
